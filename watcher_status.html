<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="30">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Watcher Status — Drop Watcher</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0a0a; --surface:#111; --border:#1e1e1e; --text:#f0f0f0; --muted:#888; --red:#c0392b; --orange:#e67e22; --green:#2ecc71; --yellow:#f1c40f; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:"Space Mono",monospace; min-height:100vh; }
  .dw-nav { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid var(--border); }
  .dw-nav .logo { font-size:18px; font-weight:700; letter-spacing:2px; text-decoration:none; color:var(--text); }
  .dw-nav .logo span { color:var(--red); }
  .container { max-width:800px; margin:48px auto; padding:0 24px; }
  h1 { font-size:20px; letter-spacing:2px; margin-bottom:8px; }
  .sub { color:var(--muted); font-size:12px; margin-bottom:32px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:16px; margin-bottom:32px; }
  .card {
    background:var(--surface); border:1px solid var(--border);
    padding:20px; text-align:center;
  }
  .card .label { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .card .value { font-size:28px; font-weight:700; }
  .card .detail { font-size:10px; color:var(--muted); margin-top:4px; }
  .breakdown { display:flex; gap:24px; justify-content:center; margin-bottom:32px; }
  .breakdown .item { text-align:center; }
  .breakdown .count { font-size:24px; font-weight:700; }
  .breakdown .blabel { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-top:4px; }
  .timestamp-row { display:flex; gap:24px; flex-wrap:wrap; margin-bottom:32px; }
  .ts-card {
    background:var(--surface); border:1px solid var(--border);
    padding:16px 20px; flex:1; min-width:200px;
  }
  .ts-card .label { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .ts-card .value { font-size:13px; color:var(--text); }
  .ts-card .ago { font-size:11px; color:var(--orange); margin-top:4px; }
  .loading { color:var(--muted); font-size:13px; text-align:center; padding:48px 0; }
  .error { color:var(--red); font-size:13px; text-align:center; padding:48px 0; }
  .pulse { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--green); margin-right:8px; animation:blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  footer { text-align:center; color:var(--muted); font-size:11px; margin-top:48px; letter-spacing:1px; }
  footer .hgr { color:var(--red); font-size:16px; font-weight:700; display:block; margin-top:8px; }
</style>
</head>
<body>
<nav class="dw-nav">
  <a href="/" class="logo">DROP <span>WATCHER</span></a>
</nav>
<div class="container">
  <h1><span class="pulse"></span>WATCHER STATUS</h1>
  <p class="sub">Auto-refreshes every 30 seconds</p>
  <div id="content" class="loading">Loading stats...</div>
  <footer>
    instockornot.club
    <span class="hgr">HGR</span>
  </footer>
</div>
<script>
function timeAgo(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ' + (mins % 60) + 'm ago';
  return Math.floor(hrs / 24) + 'd ago';
}

fetch('/api/stats')
  .then(r => r.json())
  .then(s => {
    document.getElementById('content').innerHTML = `
      <div class="grid">
        <div class="card">
          <div class="label">Active Watchers</div>
          <div class="value" style="color:var(--green)">${s.watchers_active}</div>
        </div>
        <div class="card">
          <div class="label">Drops (24h)</div>
          <div class="value" style="color:var(--orange)">${s.drops_24h}</div>
        </div>
        <div class="card">
          <div class="label">Drops (All Time)</div>
          <div class="value">${s.drops_total}</div>
        </div>
      </div>
      <div class="breakdown">
        <div class="item">
          <div class="count" style="color:var(--red)">${s.critical_24h}</div>
          <div class="blabel">Critical</div>
        </div>
        <div class="item">
          <div class="count" style="color:var(--orange)">${s.high_24h}</div>
          <div class="blabel">High</div>
        </div>
        <div class="item">
          <div class="count" style="color:var(--yellow)">${s.medium_24h}</div>
          <div class="blabel">Medium</div>
        </div>
      </div>
      <div class="timestamp-row">
        <div class="ts-card">
          <div class="label">Latest Drop</div>
          <div class="value">${s.latest_drop ? new Date(s.latest_drop).toLocaleString() : '—'}</div>
          <div class="ago">${timeAgo(s.latest_drop)}</div>
        </div>
        <div class="ts-card">
          <div class="label">Last Preflight</div>
          <div class="value">${s.last_preflight ? new Date(s.last_preflight).toLocaleString() : '—'}</div>
          <div class="ago">${timeAgo(s.last_preflight)}</div>
        </div>
      </div>
      <div class="card" style="margin-bottom:32px;text-align:left;padding:20px 24px">
        <div class="label" style="margin-bottom:12px">Watchdog</div>
        ${(() => {
          const fails = Object.keys(s.watchdog_failures || {});
          if (fails.length === 0) {
            return '<div style="color:var(--green);font-size:14px">All services healthy</div>';
          } else {
            return fails.map(f => '<div style="color:var(--red);font-size:14px;margin-bottom:4px">' + f + ' — DOWN since ' + new Date(s.watchdog_failures[f]).toLocaleString() + '</div>').join('');
          }
        })()}
        <div class="detail" style="margin-top:8px">Last check: ${s.last_watchdog || 'never'}</div>
      </div>`;

  })
  .catch(() => {
    document.getElementById('content').innerHTML = '<div class="error">Failed to load stats. Is the API running?</div>';
  });
</script>
</body>
</html>
